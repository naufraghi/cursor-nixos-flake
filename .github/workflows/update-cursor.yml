name: Update Cursor (IDE + Agent)

on:
  schedule:
    - cron: '0 12 * * *'  # Run daily at 12:00 UTC
  workflow_dispatch:  # Allow manual triggering

jobs:
  update-cursor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixpkgs-unstable

    - name: Update Cursor IDE and Agent pins
      id: update
      run: |
        chmod +x update-cursor.sh
        # No arguments: refresh both the AppImage (flake.nix) and agent CLI
        # (cursor-agent-versions.nix) when upstream has newer builds.
        ./update-cursor.sh

    - name: Update flake lock file
      if: steps.update.outputs.cursor_updates != 'none' && steps.update.outputs.cursor_updates != ''
      run: nix flake update

    - name: Test the updated flake
      if: steps.update.outputs.cursor_updates != 'none' && steps.update.outputs.cursor_updates != ''
      run: |
        nix flake check
        nix build '.#cursor' '.#cursor-agent' --dry-run

    - name: Commit and push changes
      if: steps.update.outputs.cursor_updates != 'none' && steps.update.outputs.cursor_updates != ''
      env:
        SCOPE: ${{ steps.update.outputs.cursor_updates }}
      run: |
        case "$SCOPE" in
          ide)   COMMIT_MSG="Update Cursor IDE (AppImage)" ;;
          agent) COMMIT_MSG="Update Cursor Agent CLI (lab tarball)" ;;
          both)  COMMIT_MSG="Update Cursor IDE and Agent CLI" ;;
          *)     echo "Unexpected scope: $SCOPE"; exit 1 ;;
        esac

        git add flake.nix cursor-agent-versions.nix flake.lock
        if git diff --cached --quiet; then
          echo "No staged changes; nothing to commit"
          exit 0
        fi

        echo "Commit message: $COMMIT_MSG"
        git config --local user.email "action@github.com"
        git config --local user.name  "GitHub Action"
        git commit -m "$COMMIT_MSG"
        git push
